name: Deploy to Pipecat Cloud

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get date
        id: date
        run: echo "date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image (ARM64 for Pipecat Cloud)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/wild-bites-voice:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/wild-bites-voice:${{ steps.date.outputs.date }}

      - name: Deploy to Pipecat Cloud
        run: |
          curl -X POST https://api.pipecat.daily.co/v1/agents/wild-bites-voice \
            -H "Authorization: Bearer ${{ secrets.PCC_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "image": "${{ secrets.DOCKERHUB_USERNAME }}/wild-bites-voice:${{ steps.date.outputs.date }}",
              "secret_set": "wild-bites-secrets",
              "min_agents": 1
            }'
